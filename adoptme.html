<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>แจ้งความสนใจรับอุปการะสุนัข</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #41431b;
      color: #f8f3e1;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* ── Header ── */
    header {
      background: #aeb784;
      color: #41431b;
      text-align: center;
      padding: 32px 20px 24px;
    }
    header h1 { font-size: 2rem; color: #41431b; }
    header p  { margin-top: 8px; font-size: 1rem; opacity: .85; }
    header a {
      display: inline-block;
      margin-top: 14px;
      color: #41431b;
      font-size: .9rem;
      font-weight: 600;
      text-decoration: none;
      opacity: .8;
    }
    header a:hover { opacity: 1; text-decoration: underline; }

    /* ── Form container ── */
    .form-wrap {
      max-width: 680px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section-card {
      background: #e3dbbb;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0,0,0,.35);
      padding: 30px 32px;
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 1.15rem;
      font-weight: 700;
      color: #41431b;
      margin-bottom: 22px;
      padding-bottom: 10px;
      border-bottom: 2px solid #aeb784;
    }

    .form-group { margin-bottom: 18px; }

    label {
      display: block;
      font-size: .9rem;
      font-weight: 600;
      color: #4a4d1e;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="tel"],
    input[type="email"],
    input[type="number"],
    select,
    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid #aeb784;
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      background: #f8f3e1;
      color: #41431b;
      transition: border-color .2s;
      outline: none;
    }
    input[type="text"]:focus,
    input[type="tel"]:focus,
    input[type="email"]:focus,
    input[type="number"]:focus,
    select:focus,
    textarea:focus {
      border-color: #41431b;
      background: #fff;
    }

    textarea { resize: vertical; min-height: 90px; }

    /* radio group */
    .radio-group { display: flex; flex-direction: column; gap: 10px; margin-top: 4px; }
    .radio-group label,
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 500;
      color: #41431b;
      cursor: pointer;
    }
    input[type="radio"],
    input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #41431b;
      cursor: pointer;
      flex-shrink: 0;
    }

    /* checkbox notice */
    .checkbox-notice {
      background: #d4ccaa;
      border: 1.5px solid #aeb784;
      border-radius: 10px;
      padding: 14px 16px;
      font-size: .9rem;
      line-height: 1.55;
      color: #41431b;
    }

    /* submit */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #aeb784;
      color: #41431b;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background .2s;
    }
    .submit-btn:hover { background: #c8ce9e; }

    /* ── Footer student info ── */
    footer {
      text-align: center;
      margin-top: 10px;
      font-size: .83rem;
      color: #f8f3e1;
      padding: 12px 20px 24px;
    }
  </style>
</head>
<body>

  <header>
    <h1>🐾 แจ้งความสนใจรับอุปการะสุนัข</h1>
    <p>กรุณากรอกข้อมูลให้ครบถ้วน เพื่อให้เราติดต่อกลับได้อย่างรวดเร็ว</p>
    <a href="index.html">← กลับไปดูโปรไฟล์น้องหมา</a>
  </header>

  <div class="form-wrap">
    <form action="#" method="post">

      <!-- ── Section 1: Personal Info ── -->
      <div class="section-card">
        <div class="section-title">ส่วนที่ 1 — ข้อมูลส่วนตัวของผู้สนใจรับอุปการะ</div>

        <div class="form-group">
          <label for="fullname">ชื่อ – นามสกุล <span style="color:#d97b3b">*</span></label>
          <input type="text" id="fullname" name="fullname" placeholder="เช่น สมชาย ใจดี" required />
        </div>

        <div class="form-group">
          <label for="phone">เบอร์ติดต่อ <span style="color:#d97b3b">*</span></label>
          <input type="tel" id="phone" name="phone" placeholder="เช่น 081-234-5678" required />
        </div>

        <div class="form-group">
          <label for="email">Email <span style="color:#d97b3b">*</span></label>
          <input type="email" id="email" name="email" placeholder="เช่น example@email.com" required />
        </div>
      </div>

      <!-- ── Section 2: Living Environment ── -->
      <div class="section-card">
        <div class="section-title">ส่วนที่ 2 — สิ่งแวดล้อมในการเลี้ยงดู</div>

        <div class="form-group">
          <label for="address">ที่อยู่ <span style="color:#d97b3b">*</span></label>
          <textarea id="address" name="address" placeholder="กรอกที่อยู่ปัจจุบันของท่าน" required></textarea>
        </div>

        <div class="form-group">
          <label for="housing">ลักษณะที่พักอาศัย <span style="color:#d97b3b">*</span></label>
          <select id="housing" name="housing" required>
            <option value="" disabled selected>— กรุณาเลือก —</option>
            <option value="garden_house">บ้านสวน</option>
            <option value="detached_house">บ้านเดี่ยว</option>
            <option value="townhouse">บ้านทาวน์โฮม</option>
            <option value="condo">คอนโดมิเนียม / หอพัก</option>
          </select>
        </div>

        <div class="form-group">
          <label>การเลี้ยงดูสุนัข <span style="color:#d97b3b">*</span></label>
          <div class="radio-group">
            <label>
              <input type="radio" name="living_space" value="indoor" required />
              เลี้ยงสุนัขภายในบ้าน
            </label>
            <label>
              <input type="radio" name="living_space" value="outdoor" />
              เลี้ยงสุนัขภายนอกบ้าน
            </label>
          </div>
        </div>

        <div class="form-group">
          <label for="pet_count">จำนวนสัตว์เลี้ยงที่มีอยู่ปัจจุบัน (ตัว) <span style="color:#d97b3b">*</span></label>
          <input type="number" id="pet_count" name="pet_count" min="0" placeholder="เช่น 0" required />
        </div>

        <div class="form-group">
          <div class="checkbox-notice">
            <label class="checkbox-label">
              <input type="checkbox" name="acknowledgement" required />
              การส่งแบบฟอร์มนี้เป็นการแจ้งความสนใจ โดยไม่รับรองการได้รับอุปการะสุนัข
            </label>
          </div>
        </div>

        <button type="submit" class="submit-btn">ส่งแบบฟอร์ม</button>
      </div>

    </form>
  </div>

  <footer>
    รหัสนิสิต: 6833024521&nbsp;&nbsp;|&nbsp;&nbsp;ชื่อ: Kanit Srikaew &nbsp;|&nbsp; 2110507 Software Dev Practice II
  </footer>

</body>
</html>
